import java.util.Properties

plugins {
    id "com.android.application"
    id "org.jetbrains.kotlin.android"
    id "dev.flutter.flutter-gradle-plugin"
    id "com.google.gms.google-services"
}

def keystoreProperties = new Properties()
def keystorePropertiesFile = rootProject.file('key.properties')
if (keystorePropertiesFile.exists()) {
    keystorePropertiesFile.withInputStream { stream ->
        keystoreProperties.load(stream)
    }
}

android {
    namespace "com.cureconnect.app"
    compileSdk 35
    ndkVersion "27.0.12077973"

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = "17"
    }

    signingConfigs {
        release {
            keyAlias = keystoreProperties['keyAlias']
            keyPassword = keystoreProperties['keyPassword']
            storeFile = keystoreProperties['storeFile'] ? file(keystoreProperties['storeFile']) : null
            storePassword = keystoreProperties['storePassword']
        }
    }

    defaultConfig {
        applicationId "com.cureconnect.app"
        minSdk 23
        targetSdk 35
        versionCode 2
        versionName "1.1.0"
        multiDexEnabled true
    }

    buildTypes {
        release {
            // Default to debug signing
            signingConfig = signingConfigs.debug
            
            // Only use release signing if the keystore file and properties exist
            if (keystorePropertiesFile.exists() && 
                keystoreProperties['storeFile'] != null && 
                file(keystoreProperties['storeFile']).exists()) {
                signingConfig = signingConfigs.release
            }

            minifyEnabled false
            shrinkResources false
        }
    }
}

flutter {
    source "../.."
}
