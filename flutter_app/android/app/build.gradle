plugins {
    id "com.android.application"
    id "org.jetbrains.kotlin.android"
    id "dev.flutter.flutter-gradle-plugin"
    id "com.google.gms.google-services"
}

def keystorePropertiesFile = rootProject.file("key.properties")
def keystoreProperties = new Properties()
if (keystorePropertiesFile.exists()) {
    keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
}

android {
    namespace "com.cureconnect.app"
    compileSdk 35
    ndkVersion "27.0.12077973"

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = "17"
    }

    defaultConfig {
        applicationId "com.cureconnect.app"
        minSdk 23
        targetSdk 35
        versionCode 2
        versionName "1.1.0"
        multiDexEnabled true
    }

    signingConfigs {
        release {
            if (keystorePropertiesFile.exists()) {
                storeFile     file(keystoreProperties["storeFile"])
                storePassword keystoreProperties["storePassword"]
                keyAlias      keystoreProperties["keyAlias"]
                keyPassword   keystoreProperties["keyPassword"]
            }
        }
    }

    buildTypes {
        debug {
            // No signingConfig here — AGP + Flutter handle debug signing automatically
            debuggable true
        }
        release {
            // Use release keystore if available, otherwise fall back to AGP default debug key
            signingConfig keystorePropertiesFile.exists()
                ? signingConfigs.release
                : signingConfigs.debug
            minifyEnabled false
            shrinkResources false
        }
    }
}

flutter {
    source "../.."
}
