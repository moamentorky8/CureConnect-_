name: Build Flutter APK

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter 3.24.5
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.24.5"
          channel: stable
          cache: true

      - name: Print Flutter & Dart versions
        run: flutter --version

      # CRITICAL: must run before any Gradle step because settings.gradle reads this file
      - name: Write local.properties
        run: |
          cat > flutter_app/android/local.properties << PROPS
          flutter.sdk=$FLUTTER_ROOT
          sdk.dir=$ANDROID_SDK_ROOT
          flutter.versionCode=2
          flutter.versionName=1.1.0
          PROPS
          echo "=== local.properties ==="
          cat flutter_app/android/local.properties

      - name: Install Android NDK 27
        run: |
          echo "y" | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager \
            "ndk;27.0.12077973" \
            "build-tools;35.0.0" \
            "platforms;android-35" 2>&1 | tail -5

      - name: Write google-services.json
        working-directory: flutter_app/android/app
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          if [ -n "$GOOGLE_SERVICES_JSON" ]; then
            echo "$GOOGLE_SERVICES_JSON" > google-services.json
            echo "✅ google-services.json from secret"
          else
            echo "⚠️  No GOOGLE_SERVICES_JSON secret — using placeholder"
          fi

      - name: Flutter pub get
        working-directory: flutter_app
        run: flutter pub get

      - name: Flutter analyze (non-fatal)
        working-directory: flutter_app
        run: flutter analyze --no-fatal-infos --no-fatal-warnings
        continue-on-error: true

      - name: Build debug APK
        working-directory: flutter_app
        run: |
          flutter build apk --debug \
            --dart-define=ELEVENLABS_API_KEY=placeholder \
            --dart-define=ELEVENLABS_VOICE_ID=placeholder \
            --dart-define=ELEVENLABS_MODEL_ID=eleven_multilingual_v2

      - name: Setup signing (if secrets present)
        working-directory: flutter_app
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEY_ALIAS:       ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD:    ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD:  ${{ secrets.STORE_PASSWORD }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 --decode > android/app/release.jks
            cat > android/key.properties << KPROPS
          storePassword=$STORE_PASSWORD
          keyPassword=$KEY_PASSWORD
          keyAlias=$KEY_ALIAS
          storeFile=release.jks
          KPROPS
            echo "✅ Keystore configured"
          else
            echo "⚠️  No keystore secret — release will use debug signing"
          fi

      - name: Build release APK
        working-directory: flutter_app
        run: |
          flutter build apk --release \
            --dart-define=ELEVENLABS_API_KEY=placeholder \
            --dart-define=ELEVENLABS_VOICE_ID=placeholder \
            --dart-define=ELEVENLABS_MODEL_ID=eleven_multilingual_v2

      - name: List APK outputs
        run: |
          echo "=== Built APKs ==="
          find flutter_app/build/app/outputs/flutter-apk/ -name "*.apk" -exec ls -lh {} \;

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: CureConnect-debug
          path: flutter_app/build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 30

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: CureConnect-release
          path: flutter_app/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
