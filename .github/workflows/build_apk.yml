name: Build Flutter APK

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    name: Build Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.22.0"
          channel: stable
          cache: true

      - name: Generate local.properties
        working-directory: flutter_app/android
        run: |
          echo "flutter.sdk=$FLUTTER_ROOT" > local.properties
          echo "sdk.dir=$ANDROID_SDK_ROOT" >> local.properties
          echo "flutter.versionCode=2" >> local.properties
          echo "flutter.versionName=1.1.0" >> local.properties
          echo "✅ local.properties:"
          cat local.properties

      - name: Create google-services.json
        working-directory: flutter_app/android/app
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          if [ -n "$GOOGLE_SERVICES_JSON" ]; then
            echo "$GOOGLE_SERVICES_JSON" > google-services.json
            echo "✅ google-services.json written from secret"
          else
            echo "⚠️  No GOOGLE_SERVICES_JSON secret — using placeholder"
          fi

      - name: Get Flutter dependencies
        working-directory: flutter_app
        run: flutter pub get

      - name: Analyze Flutter code
        working-directory: flutter_app
        run: flutter analyze --no-fatal-infos
        continue-on-error: true

      - name: Build debug APK
        working-directory: flutter_app
        run: flutter build apk --debug --verbose

      - name: Build release APK
        working-directory: flutter_app
        env:
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 --decode > android/app/release.jks
            cat > android/key.properties << KEYEOF
          storePassword=$STORE_PASSWORD
          keyPassword=$KEY_PASSWORD
          keyAlias=$KEY_ALIAS
          storeFile=release.jks
          KEYEOF
            echo "✅ Signed release build"
            flutter build apk --release
          else
            echo "⚠️  No keystore — unsigned release build"
            flutter build apk --release
          fi

      - name: List APK outputs
        run: |
          echo "=== APK files ==="
          find flutter_app/build/app/outputs/flutter-apk/ -name "*.apk" 2>/dev/null || echo "No APKs found"

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: flutter_app/build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 14

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: flutter_app/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 14
