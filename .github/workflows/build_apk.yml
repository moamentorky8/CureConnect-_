name: Build Flutter APK

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.24.5"
          channel: stable
          cache: true

      - name: Print Flutter version
        run: flutter --version

      - name: Write local.properties
        run: |
          mkdir -p flutter_app/android
          echo "flutter.sdk=$FLUTTER_ROOT" > flutter_app/android/local.properties
          echo "sdk.dir=$ANDROID_SDK_ROOT" >> flutter_app/android/local.properties
          echo "flutter.versionCode=2" >> flutter_app/android/local.properties
          echo "flutter.versionName=1.1.0" >> flutter_app/android/local.properties

      - name: Install NDK and SDK components
        run: |
          SDKMANAGER="$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager"
          yes | $SDKMANAGER --licenses > /dev/null 2>&1 || true
          $SDKMANAGER "ndk;27.0.12077973" "build-tools;35.0.0" "platforms;android-35"

      - name: Write google-services.json
        working-directory: flutter_app/android/app
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          if [ -n "$GOOGLE_SERVICES_JSON" ]; then
            echo "$GOOGLE_SERVICES_JSON" > google-services.json
            echo "Used real google-services.json from secret"
          else
            echo '{"project_info":{"project_number":"0","project_id":"placeholder"},"client":[{"client_info":{"mobilesdk_app_id":"1:0:android:0","android_client_info":{"package_name":"com.cureconnect.app"}}}]}' > google-services.json
            echo "Using placeholder google-services.json"
          fi

      - name: Flutter pub get
        working-directory: flutter_app
        run: flutter pub get

      - name: Build debug APK
        working-directory: flutter_app
        run: |
          flutter build apk --debug \
            --dart-define=ELEVENLABS_API_KEY=placeholder \
            --dart-define=ELEVENLABS_VOICE_ID=placeholder \
            --dart-define=ELEVENLABS_MODEL_ID=eleven_multilingual_v2

      - name: Build release APK
        working-directory: flutter_app
        run: |
          flutter build apk --release \
            --dart-define=ELEVENLABS_API_KEY=placeholder \
            --dart-define=ELEVENLABS_VOICE_ID=placeholder \
            --dart-define=ELEVENLABS_MODEL_ID=eleven_multilingual_v2

      - name: List APK outputs
        run: |
          echo "Listing all generated APKs:"
          find flutter_app/build/app/outputs/flutter-apk/ -name "*.apk" -ls || echo "No APKs found"

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: CureConnect-debug
          path: flutter_app/build/app/outputs/flutter-apk/app-debug.apk

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: CureConnect-release
          path: flutter_app/build/app/outputs/flutter-apk/app-release.apk
