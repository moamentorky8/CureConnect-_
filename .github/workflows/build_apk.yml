name: Build Flutter APK

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter 3.24.5
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.24.5"
          channel: stable
          cache: true

      - name: Print Flutter version
        run: flutter --version

      # MUST run before Gradle — settings.gradle reads this at config phase
      # Using printf to avoid heredoc indentation issues
      - name: Write local.properties
        run: |
          printf "flutter.sdk=%s\n" "$FLUTTER_ROOT"         > flutter_app/android/local.properties
          printf "sdk.dir=%s\n"    "$ANDROID_SDK_ROOT"     >> flutter_app/android/local.properties
          printf "flutter.versionCode=2\n"                  >> flutter_app/android/local.properties
          printf "flutter.versionName=1.1.0\n"              >> flutter_app/android/local.properties
          echo "=== local.properties ==="
          cat flutter_app/android/local.properties

      - name: Install NDK and Android SDK components
        run: |
          SDKMANAGER="$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager"
          yes | $SDKMANAGER --licenses > /dev/null 2>&1 || true
          $SDKMANAGER "ndk;27.0.12077973" "build-tools;35.0.0" "platforms;android-35"

      - name: Write google-services.json
        working-directory: flutter_app/android/app
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          if [ -n "$GOOGLE_SERVICES_JSON" ]; then
            echo "$GOOGLE_SERVICES_JSON" > google-services.json
            echo "Used real google-services.json from secret"
          else
            echo "Using placeholder google-services.json"
          fi

      - name: Flutter pub get
        working-directory: flutter_app
        run: flutter pub get

      - name: Flutter analyze
        working-directory: flutter_app
        run: flutter analyze --no-fatal-infos --no-fatal-warnings
        continue-on-error: true

      - name: Build debug APK
        working-directory: flutter_app
        run: |
          flutter build apk --debug \
            --dart-define=ELEVENLABS_API_KEY=placeholder \
            --dart-define=ELEVENLABS_VOICE_ID=placeholder \
            --dart-define=ELEVENLABS_MODEL_ID=eleven_multilingual_v2

      - name: Setup release signing
        working-directory: flutter_app/android
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEY_ALIAS:       ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD:    ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD:  ${{ secrets.STORE_PASSWORD }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 --decode > app/release.jks
            printf "storePassword=%s\nkeyPassword=%s\nkeyAlias=%s\nstoreFile=release.jks\n" \
              "$STORE_PASSWORD" "$KEY_PASSWORD" "$KEY_ALIAS" > key.properties
            echo "Keystore configured for signed release"
          else
            echo "No keystore — release APK will use debug signing"
          fi

      - name: Build release APK
        working-directory: flutter_app
        run: |
          flutter build apk --release \
            --dart-define=ELEVENLABS_API_KEY=placeholder \
            --dart-define=ELEVENLABS_VOICE_ID=placeholder \
            --dart-define=ELEVENLABS_MODEL_ID=eleven_multilingual_v2

      - name: Show APK sizes
        run: |
          find flutter_app/build/app/outputs/flutter-apk/ -name "*.apk" \
            -exec ls -lh {} \; 2>/dev/null || echo "No APKs found"

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: CureConnect-debug
          path: flutter_app/build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 30

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: CureConnect-release
          path: flutter_app/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
