name: Build Release APK

on:
  workflow_dispatch:
  push:

permissions:
  contents: write

jobs:
  build-release-apk:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: flutter_app

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.24.5"
          channel: stable
          cache: true

      - name: Get Flutter dependencies
        run: flutter pub get

      - name: Sync Android support files
        run: flutter create . --platforms=android

      - name: Write google-services.json
        run: |
          mkdir -p android/app
          echo "${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}" | base64 --decode > android/app/google-services.json

      - name: Patch Gradle for Google services
        run: |
          if [ -f android/build.gradle ]; then
            grep -q 'com.google.gms:google-services' android/build.gradle || \
            sed -i '/dependencies {/a\        classpath "com.google.gms:google-services:4.4.2"' android/build.gradle
          fi

          if [ -f android/app/build.gradle ]; then
            grep -q 'com.google.gms.google-services' android/app/build.gradle || \
            printf '\napply plugin: "com.google.gms.google-services"\n' >> android/app/build.gradle
          fi

          if [ -f android/build.gradle.kts ]; then
            grep -q 'com.google.gms:google-services' android/build.gradle.kts || \
            sed -i '/dependencies {/a\        classpath("com.google.gms:google-services:4.4.2")' android/build.gradle.kts
          fi

          if [ -f android/app/build.gradle.kts ]; then
            grep -q 'com.google.gms.google-services' android/app/build.gradle.kts || \
            sed -i '0,/plugins {/s//plugins {\n    id("com.google.gms.google-services")/' android/app/build.gradle.kts
          fi

      - name: Force supported Gradle wrapper version
        run: |
          mkdir -p android/gradle/wrapper
          cat > android/gradle/wrapper/gradle-wrapper.properties <<EOF
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.7-all.zip
          EOF

      - name: Decode Android keystore
        run: |
          mkdir -p android/app
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/app/cureconnect-release.jks

      - name: Write signing properties
        run: |
          cat > android/key.properties <<EOF
          storePassword=${{ secrets.ANDROID_STORE_PASSWORD }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          storeFile=cureconnect-release.jks
          EOF

      - name: Build release APK
        run: flutter build apk --release

      - name: Set release tag
        run: echo "RELEASE_TAG=apk-${GITHUB_REF_NAME//\//-}-${GITHUB_RUN_NUMBER}" >> "$GITHUB_ENV"

      - name: Upload APK to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: CureConnect APK ${{ env.RELEASE_TAG }}
          generate_release_notes: true
          prerelease: true
          files: flutter_app/build/app/outputs/flutter-apk/app-release.apk
