name: Build CureConnect APK

on:
  push:
    branches: [ "main", "work" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          java-version: '12.x'
          distribution: 'zulu'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Decode Firebase Config
        run: |
          echo "${{ secrets.GOOGLE_SERVICES_JSON }}" > flutter_app/android/app/google-services.json

      - name: Install dependencies
        run: cd flutter_app && flutter pub get

      - name: Build APK
        run: cd flutter_app && flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: CureConnect-Release
          path: flutter_app/build/app/outputs/flutter-apk/app-release.apk
