name: Build Release APK

on:
  workflow_dispatch:
  push:

permissions:
  contents: write

jobs:
  build-release-apk:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: flutter_app

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.24.5"
          channel: stable
          cache: true

      - name: Get Flutter dependencies
        run: flutter pub get

      - name: Sync Android support files
        run: flutter create . --platforms=android

      - name: Write google-services.json
        run: |
          mkdir -p android/app
          echo "${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}" | base64 --decode > android/app/google-services.json

      - name: Patch Gradle for Google services
        run: |
          python3 <<'PY'
          import json
          import re
          from pathlib import Path

          plugin_id = "com.google.gms.google-services"
          plugin_version = "4.4.4"

          def insert_after_plugins_block(text: str, line_to_add: str) -> str:
              if line_to_add in text:
                  return text
              marker = "plugins {"
              index = text.find(marker)
              if index == -1:
                  return text + "\n" + line_to_add + "\n"
              insert_at = text.find("\n", index)
              return text[: insert_at + 1] + f"    {line_to_add}\n" + text[insert_at + 1 :]

          def patch_settings(path: Path, is_kts: bool) -> None:
              if not path.exists():
                  return
              text = path.read_text()
              line = (
                  f'id("{plugin_id}") version "{plugin_version}" apply false'
                  if is_kts
                  else f"id '{plugin_id}' version '{plugin_version}' apply false"
              )
              updated = insert_after_plugins_block(text, line)
              path.write_text(updated)

          def patch_app(path: Path, is_kts: bool) -> None:
              if not path.exists():
                  return
              text = path.read_text()
              line = f'id("{plugin_id}")' if is_kts else f"id '{plugin_id}'"
              updated = insert_after_plugins_block(text, line)
              package_name = read_package_name()
              if package_name:
                  updated = sync_android_package(updated, package_name)
              path.write_text(updated)

          def read_package_name() -> str | None:
              json_path = Path("android/app/google-services.json")
              if not json_path.exists():
                  return None

              payload = json.loads(json_path.read_text())
              clients = payload.get("client", [])
              if not clients:
                  return None

              android_info = clients[0].get("client_info", {}).get("android_client_info", {})
              return android_info.get("package_name")

          def sync_android_package(text: str, package_name: str) -> str:
              patterns = [
                  (r'namespace\s*=\s*"[^"]+"', f'namespace = "{package_name}"'),
                  (r"namespace\s+'[^']+'", f"namespace '{package_name}'"),
                  (r'applicationId\s*=\s*"[^"]+"', f'applicationId = "{package_name}"'),
                  (r'applicationId\s+"[^"]+"', f'applicationId "{package_name}"'),
                  (r"applicationId\s+'[^']+'", f"applicationId '{package_name}'"),
              ]

              updated = text
              for pattern, replacement in patterns:
                  updated = re.sub(pattern, replacement, updated)
              return updated

          patch_settings(Path("android/settings.gradle"), is_kts=False)
          patch_settings(Path("android/settings.gradle.kts"), is_kts=True)
          patch_app(Path("android/app/build.gradle"), is_kts=False)
          patch_app(Path("android/app/build.gradle.kts"), is_kts=True)
          PY

      - name: Force supported Gradle wrapper version
        run: |
          mkdir -p android/gradle/wrapper
          cat > android/gradle/wrapper/gradle-wrapper.properties <<EOF
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.7-all.zip
          EOF

      - name: Decode Android keystore
        run: |
          mkdir -p android/app
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/app/cureconnect-release.jks

      - name: Write signing properties
        run: |
          cat > android/key.properties <<EOF
          storePassword=${{ secrets.ANDROID_STORE_PASSWORD }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          storeFile=cureconnect-release.jks
          EOF

      - name: Build release APK
        run: flutter build apk --release

      - name: Set release tag
        run: echo "RELEASE_TAG=apk-${GITHUB_REF_NAME//\//-}-${GITHUB_RUN_NUMBER}" >> "$GITHUB_ENV"

      - name: Upload APK to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: CureConnect APK ${{ env.RELEASE_TAG }}
          generate_release_notes: true
          prerelease: true
          files: flutter_app/build/app/outputs/flutter-apk/app-release.apk
