name: Build CureConnect APK

on:
  push:
    branches: [ "main", "work" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # 1. سحب الكود بأحدث إصدار (v4)
      - uses: actions/checkout@v4

      # 2. إعداد جافا بإصدار حديث ومستقر
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 3. إعداد فلاتر
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'

      # 4. حقن ملف Firebase من الـ Secrets
      - name: Decode Firebase Config
        run: |
          mkdir -p flutter_app/android/app
          echo "${{ secrets.GOOGLE_SERVICES_JSON }}" > flutter_app/android/app/google-services.json

      # 5. تثبيت المكتبات
      - name: Install dependencies
        run: |
          cd flutter_app
          flutter pub get

      # 6. بناء الـ APK
      - name: Build APK
        run: |
          cd flutter_app
          flutter build apk --release

      # 7. رفع الـ APK باستخدام v4 (عشان نتجنب الخطأ اللي ظهرلك)
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: CureConnect-Release
          path: flutter_app/build/app/outputs/flutter-apk/app-release.apk
